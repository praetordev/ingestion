name: Image

# Build the service image and push it to GHCR on merge to main (and on version
# tags). PRs build the image but do NOT push, so a broken Dockerfile is caught
# before merge. The Helm chart pulls ghcr.io/niftel/praetor-ingestion (see the
# chart's image.registry).
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: Existing release version to rebuild into GHCR (without v prefix)
        required: true
        type: string

concurrency:
  group: image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  attestations: write
  contents: read
  id-token: write
  packages: write
  security-events: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/v{0}', inputs.version) || github.ref }}

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/niftel/praetor-ingestion
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=scan-${{ github.sha }},enable=${{ github.event_name == 'pull_request' }}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          load: ${{ github.event_name == 'pull_request' }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: ${{ github.event_name != 'pull_request' }}
          provenance: ${{ github.event_name != 'pull_request' && 'mode=max' || 'false' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image
        id: scan
        uses: anchore/scan-action@v7
        with:
          image: ${{ github.event_name == 'pull_request' && format('ghcr.io/niftel/praetor-ingestion:scan-{0}', github.sha) || format('ghcr.io/niftel/praetor-ingestion@{0}', steps.build.outputs.digest) }}
          fail-build: false
          severity-cutoff: high
          cache-db: true

      - name: Upload vulnerability report
        if: always() && steps.scan.outputs.sarif != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
          category: container-ingestion

      - name: Attest build provenance
        if: github.event_name != 'pull_request'
        uses: actions/attest@v4
        with:
          subject-name: ghcr.io/niftel/praetor-ingestion
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
