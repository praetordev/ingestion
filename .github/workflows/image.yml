name: Image

# Build the service image and push it to GHCR on merge to main (and on version
# tags). PRs build the image but do NOT push, so a broken Dockerfile is caught
# before merge. The Helm chart pulls ghcr.io/niftel/praetor-ingestion (see the
# chart's image.registry).
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: Existing release version to rebuild into GHCR (without v prefix)
        required: true
        type: string

concurrency:
  group: image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  attestations: write
  contents: read
  id-token: write
  packages: write
  security-events: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/v{0}', inputs.version) || github.ref }}

      - name: Set up QEMU
        if: github.event_name != 'pull_request'
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/niftel/praetor-ingestion
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=scan-${{ github.sha }},enable=${{ github.event_name == 'pull_request' }}
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: ${{ github.event_name == 'pull_request' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
          load: ${{ github.event_name == 'pull_request' }}
          pull: true
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: ${{ github.event_name != 'pull_request' }}
          provenance: ${{ github.event_name != 'pull_request' && 'mode=max' || 'false' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify multi-platform manifest
        if: github.event_name != 'pull_request'
        env:
          IMAGE: ghcr.io/niftel/praetor-ingestion@${{ steps.build.outputs.digest }}
        run: |
          platforms="$(docker buildx imagetools inspect "$IMAGE" --format '{{range .Manifest.Manifests}}{{printf "%s/%s\n" .Platform.OS .Platform.Architecture}}{{end}}')"
          grep -qx 'linux/amd64' <<<"$platforms"
          grep -qx 'linux/arm64' <<<"$platforms"

      - name: Scan image
        id: scan
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: ${{ github.event_name == 'pull_request' && format('ghcr.io/niftel/praetor-ingestion:scan-{0}', github.sha) || format('ghcr.io/niftel/praetor-ingestion@{0}', steps.build.outputs.digest) }}
          fail-build: false
          only-fixed: true
          severity-cutoff: high
          cache-db: true

      - name: Upload vulnerability report
        if: always() && steps.scan.outputs.sarif != ''
        uses: github/codeql-action/upload-sarif@1ad29ea4a422cce9a242a9fae469541dcd08addc # v4
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
          category: container-ingestion

      - name: Attest build provenance
        if: github.event_name != 'pull_request'
        uses: actions/attest@f6bf1532d7d6793fce74eac584813a8eee607999 # v4
        with:
          subject-name: ghcr.io/niftel/praetor-ingestion
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
